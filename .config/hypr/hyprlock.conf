general {
    hide_cursor = true
}

# Background: a blurred screenshot of your current desktop
background {
    monitor =
    path = screenshot
    blur_passes = 3           # Number of blur passes
    blur_size = 7             # Blur strength
}

# The main clock
label {
    monitor =
    text = $TIME              # Shows the current time in 24h format
    font_size = 90
    font_family = DejaVuSansM Nerd Font

    position = 0, -150
    halign = center
    valign = center
}

# The date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"  # Updates every 60 seconds
    font_size = 25
    font_family = DejaVuSansM Nerd Font

    position = 0, -250
    halign = center
    valign = center
}

# Password input field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.2            # Size of the password dots
    dots_spacing = 0.3          # Spacing between dots
    dots_center = true
    outer_color = rgba(33ccffee)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(255, 255, 255, 200)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>  # Italic placeholder

    position = 0, -350
    halign = center
    valign = center
}
